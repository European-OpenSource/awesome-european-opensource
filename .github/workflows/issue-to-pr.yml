name: Issue to PR

on:
  issues:
    types: [labeled]

jobs:
  process-submission:
    name: Process Submission
    if: contains(fromJSON('["check-submission", "approved-submission"]'), github.event.label.name)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version-file: '.python-version'

      - name: Setup Uv
        id: setup-uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Setup environment
        run: uv sync --all-extras

      - name: Parse and write submission
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VALIDATE_FLAG=""
          if [ "${{ github.event.label.name }}" = "check-submission" ]; then
            VALIDATE_FLAG="--validate-only"
          fi
          uv run python scripts/issue_to_pr.py $VALIDATE_FLAG \
            --issue-number "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --issue-body "$ISSUE_BODY" \
            --output-dir awesome/projects

      - name: Validate all data
        run: uv run python scripts/validator.py

      - name: Show submission file
        run: |
          FILE=$(ls -t awesome/projects/*.json | head -1)
          echo "=== $FILE ==="
          cat "$FILE"
