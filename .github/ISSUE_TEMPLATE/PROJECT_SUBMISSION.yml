name: 'Project Submission'
description: Submit an open-source project to the European OpenSource catalog.
title: '[SUBMISSION] '
labels: ['project-submission']
body:
  - type: markdown
    attributes:
      value: |
        ## Submit a Project
        Fill in the fields below to submit your open-source project. Fields marked as required must be completed.

  # --- Required fields ---

  - type: input
    id: project_name
    attributes:
      label: Project Name
      placeholder: e.g. CertMate
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: Brief description of the project (max 512 characters)
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - app
        - saas
        - paas
        - faas
        - package
        - library
        - learning
        - language
        - framework
        - cli
        - api
        - scripts
        - ai
        - awesome-list
        - os
        - other
    validations:
      required: true

  - type: dropdown
    id: country
    attributes:
      label: Country
      options:
        - Italy
        - France
        - Germany
        - Spain
        - Poland
        - Netherlands
        - Belgium
        - Sweden
        - Austria
        - Czech Republic
        - Denmark
        - Finland
        - Greece
        - Hungary
        - Ireland
        - Croatia
        - Lithuania
        - Latvia
        - Slovakia
        - Slovenia
        - Estonia
        - Portugal
        - Bulgaria
        - Romania
        - Luxembourg
        - Malta
        - Cyprus
        - United Kingdom
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - GitHub
        - GitLab
        - Bitbucket
        - Gitea
        - Codeberg
        - Other
    validations:
      required: true

  - type: input
    id: url_repository
    attributes:
      label: Repository URL
      placeholder: https://github.com/owner/project
    validations:
      required: true

  - type: dropdown
    id: license
    attributes:
      label: License
      options:
        - Source-available
        - 0BSD
        - BSD-1-Clause
        - BSD-2-Clause
        - BSD-3-Clause
        - AFL-3.0
        - APL-1.0
        - Apache-1.1
        - Apache-2.0
        - APSL-2.0
        - Artistic-1.0
        - Artistic-2.0
        - AAL
        - BSL-1.0
        - 3-clause BSD License
        - 2-clause BSD License
        - 1-clause BSD License
        - 0-clause BSD license
        - BSD-3-Clause-LBNL
        - BSD-2-Clause-Patent
        - Creative Commons
        - CERN Open Hardware Licence Version 2 - Permissive
        - CERN Open Hardware Licence Version 2 - Weakly Reciprocal
        - CERN Open Hardware Licence Version 2 - Strongly Reciprocal
        - CECILL-2.1
        - CDDL-1.0
        - CPAL-1.0
        - CPL-1.0
        - CATOSL-1.1
        - Coopyleft
        - CopyFair
        - CSL
        - CAL-1.0
        - EPL-1.0
        - EPL-2.0
        - eCos-2.0
        - ECL-1.0
        - ECL-2.0
        - EFL-1.0
        - EFL-2.0
        - Entessa
        - EUDatagrid
        - EUPL-1.2
        - FairSource
        - Frameworx-1.0
        - AGPL-3.0
        - GPL-2.0
        - GPL-3.0
        - LGPL-2.1
        - LGPL-3.0
        - HPND
        - IPL-1.0
        - IPA
        - ISC
        - Jam
        - LPPL-1.3c
        - LiLiQ-P
        - LiLiQ-R
        - LiLiQ-R+
        - LPL-1.0
        - LPL-1.02
        - MS-PL
        - MS-RL
        - MirOS
        - MIT
        - MIT-0
        - Motosoto
        - MPL-1.0
        - MPL-1.1
        - MPL-2.0
        - MulanPSL
        - Multics
        - NASA-1.3
        - Naumen
        - NGPL
        - NPOSL-3.0
        - NTP
        - OCLC-2.0
        - OGTSL
        - OSL-1.0
        - OSL-2.1
        - OSL-3.0
        - OLDAP-2.8
        - QPL-1.0
        - RPSL-1.0
        - RPL-1.1
        - RPL-1.5
        - RSCPL
        - OFL-1.1
        - PPL
        - SimPL-2.0
        - Sleepycat
        - SPL-1.0
        - Watcom-1.0
        - UPL
        - NCSA
        - Upstream Compatibility License v1.0
        - Unicode Data Files and Software License
        - Unlicense
        - VSL-1.0
        - W3C
        - WXwindows
        - Xnet
        - ZPL-2.0
        - ZPL-2.1
        - Zlib
    validations:
      required: true

  - type: dropdown
    id: language
    attributes:
      label: Language
      options:
        - C
        - Bash
        - Shell
        - HTML
        - CSS
        - JavaScript
        - Java
        - Python
        - PHP
        - C++
        - C#
        - SQL
        - Perl
        - Pascal
        - Ruby
        - Lua
        - BASIC
        - Fortran
        - assembly
        - MATLAB
        - Lisp
        - COBOL
        - R
        - Ada
        - Haskell
        - Prolog
        - Go
        - Scratch
        - Visual Basic
        - ALGOL
        - Kotlin
        - Rust
        - Swift
        - Objective-C
        - Scala
        - TeX
        - TypeScript
        - HCL
        - Dart
        - Elixir
        - Erlang
        - F#
        - Julia
        - Elm
        - Other
    validations:
      required: true

  # --- Optional fields ---

  - type: input
    id: owner_name
    attributes:
      label: Owner Name
      placeholder: e.g. Fabrizio Cafolla
    validations:
      required: false

  - type: dropdown
    id: owner_type
    attributes:
      label: Owner Type
      options:
        - individual
        - community
        - organization
    validations:
      required: false

  - type: textarea
    id: owner_description
    attributes:
      label: Owner Description
      placeholder: Brief description of the owner or organization
    validations:
      required: false

  - type: input
    id: owner_website
    attributes:
      label: Owner Website URL
      placeholder: https://example.com
    validations:
      required: false

  - type: dropdown
    id: is_a_startup
    attributes:
      label: Is a Startup
      options:
        - 'Yes'
        - 'No'
    validations:
      required: false

  - type: input
    id: url_documentation
    attributes:
      label: Documentation URL
      placeholder: https://docs.example.com
    validations:
      required: false

  - type: input
    id: tags
    attributes:
      label: Tags
      placeholder: 'tag1, tag2, tag3 — max 10 tags'
    validations:
      required: false

  # --- Terms & Conditions ---

  - type: checkboxes
    id: terms
    attributes:
      label: Terms & Conditions
      options:
        - label: I have read and accept the [Terms & Conditions](https://europeanopensource.eu/terms-and-conditions/)
          required: true
